name: 자동 PR 생성

on:
  push:
    # main을 제외한 모든 브랜치에 push될 때 실행
    branches-ignore:
      - main

# 같은 브랜치에 연속으로 push가 오면 이전 실행을 취소하고 마지막 것만 실행
# (짧은 시간 안에 여러 번 push 해도 PR이 중복 생성되지 않도록)
concurrency:
  group: auto-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read        # 코드 읽기
      pull-requests: write  # PR 생성

    steps:
      - uses: actions/checkout@v4
        with:
          # 전체 git 히스토리를 가져와야 main과 diff 비교가 가능함
          fetch-depth: 0

      # 이 브랜치로 이미 열린 PR이 있는지 확인
      # → 있으면 PR 생성을 건너뜀 (PR 설명은 최초 생성본을 그대로 유지)
      - name: 이미 열린 PR 확인
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=$(gh pr list \
            --head "${{ github.ref_name }}" \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number // ""')
          echo "pr_number=$PR" >> $GITHUB_OUTPUT

      # main 브랜치 대비 현재 브랜치의 전체 변경사항을 파일로 저장
      # → Claude가 이 파일을 읽어 제목과 PR 설명(작업 요약)을 작성함
      - name: 변경사항 추출
        if: steps.check.outputs.pr_number == ''
        run: |
          git fetch origin main --no-tags
          git diff origin/main...HEAD > changes.diff

      # 폴백에서 사용할 커밋 메시지 + 변경 파일 목록 미리 추출
      # → Claude API가 실패해도 이 정보로 최소한의 PR 설명 생성 가능
      - name: 커밋 메시지 · 파일 목록 추출
        if: steps.check.outputs.pr_number == ''
        id: commits
        run: |
          MESSAGES=$(git log origin/main..HEAD --oneline --no-decorate)
          FILES=$(git diff --name-only origin/main...HEAD)
          # 멀티라인 값을 GitHub Actions output에 안전하게 저장하는 방식
          echo "messages<<EOF" >> $GITHUB_OUTPUT
          echo "$MESSAGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - uses: actions/setup-node@v4
        if: steps.check.outputs.pr_number == ''
        with:
          node-version: '20'

      - name: Anthropic SDK 설치
        if: steps.check.outputs.pr_number == ''
        run: npm install @anthropic-ai/sdk

      # Claude가 diff를 분석해서 제목과 본문을 JSON으로 출력
      # → { "title": "feat: 다이어리 생성 로직 추가", "body": "## 작업 내용\n..." }
      # COMMIT_MESSAGES / CHANGED_FILES 는 Claude 실패 시 폴백에서 사용됨
      - name: Claude로 PR 제목·설명 생성
        if: steps.check.outputs.pr_number == ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BRANCH_NAME: ${{ github.ref_name }}
          # 폴백용: API 실패 시 커밋 메시지와 파일 목록으로 PR 설명 생성
          COMMIT_MESSAGES: ${{ steps.commits.outputs.messages }}
          CHANGED_FILES: ${{ steps.commits.outputs.files }}
        run: node .github/scripts/generate-pr-description.mjs > pr_meta.json

      # jq로 JSON에서 제목과 본문을 각각 추출해서 PR 생성
      - name: PR 생성
        if: steps.check.outputs.pr_number == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE=$(jq -r '.title' pr_meta.json)
          BODY=$(jq -r '.body' pr_meta.json)

          gh pr create \
            --title "$TITLE" \
            --body "$BODY" \
            --base main \
            --head "${{ github.ref_name }}"
